      /* Sfondo del giardino: crema con leggera trama a pois (atmosfera, non rumore) */
      .sfondo-giardino {
        background-color: #FCF7EE;
        background-image:
          radial-gradient(circle at 1px 1px, rgba(94,158,74,0.10) 1px, transparent 0);

      /* Animazioni gentili (niente effetti aggressivi: l'obiettivo è la calma) */
      @keyframes galleggia { 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(-6px);} }
      .galleggia { animation: galleggia 3s ease-in-out infinite; }
      @keyframes respiro { 0%,100%{ transform: scale(1); } 50%{ transform: scale(1.06);} }
      .respiro { animation: respiro 4s ease-in-out infinite; }
      @keyframes entra { from{ opacity:0; transform: translateY(8px);} to{ opacity:1; transform:translateY(0);} }
      .entra { animation: entra .4s ease-out both; }
      @keyframes saltello { 0%,100%{transform:translateY(0);} 30%{transform:translateY(-10px);} }
      .saltello { animation: saltello 1.2s ease-in-out infinite; }
      @keyframes pop { 0%{transform:scale(0.6); opacity:0;} 60%{transform:scale(1.15);} 100%{transform:scale(1); opacity:1;} }
      .pop { animation: pop .45s cubic-bezier(.2,.9,.3,1.4) both; }
      @keyframes disegnaArco { from{ stroke-dashoffset: 200; } to{ stroke-dashoffset: 0; } }
      .arco-anim { stroke-dasharray: 200; animation: disegnaArco .7s ease-out forwards; }
      /* Lampeggio gentile per attirare l'attenzione sul suggerimento/aiutino */
      @keyframes lampeggia {
        0%, 100% { transform: scale(1);    box-shadow: 0 0 0 0 rgba(247,201,72,0); }
        50%      { transform: scale(1.08); box-shadow: 0 0 0 10px rgba(247,201,72,0.28); }
      }
      .lampeggia { animation: lampeggia 1.05s ease-in-out infinite; }

        /* =========================================================

        // schiarisce/scurisce un colore esadecimale
        function scurisci(hex, f) {
          f = f || 0.82;
          const n = parseInt(String(hex).replace("#", ""), 16);
          let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
          r = Math.round(r * f); g = Math.round(g * f); b = Math.round(b * f);
          return `rgb(${r},${g},${b})`;
        }
        // path di una stella a 5 punte
        function dStella(cx, cy, r) {
          let d = "";
          for (let i = 0; i < 10; i++) {
            const ang = (Math.PI / 5) * i - Math.PI / 2;
            const rr = (i % 2) ? r * 0.45 : r;
            d += (i === 0 ? "M" : "L") + (cx + rr * Math.cos(ang)).toFixed(1) + " " + (cy + rr * Math.sin(ang)).toFixed(1) + " ";
          }
          return d + "Z";
        }
        // path di un cuore
        function dCuore(cx, cy, s) {
          return `M ${cx} ${cy + 0.55 * s} C ${cx - 1.15 * s} ${cy - 0.05 * s} ${cx - 1.05 * s} ${cy - 0.75 * s} ${cx - 0.5 * s} ${cy - 0.75 * s} C ${cx - 0.18 * s} ${cy - 0.75 * s} ${cx} ${cy - 0.45 * s} ${cx} ${cy - 0.3 * s} C ${cx} ${cy - 0.45 * s} ${cx + 0.18 * s} ${cy - 0.75 * s} ${cx + 0.5 * s} ${cy - 0.75 * s} C ${cx + 1.05 * s} ${cy - 0.75 * s} ${cx + 1.15 * s} ${cy - 0.05 * s} ${cx} ${cy + 0.55 * s} Z`;
        }

        // VESTITO (forma + colore)
        function renderVestito(stile, colore, motivo) {
          const luce = "rgba(255,255,255,0.20)";
          let forma;
          if (stile === "ruota") {
            forma = (<g>
              <path d="M44 63 Q50 61 56 63 L78 112 Q50 122 22 112 Z" fill={colore}/>

          } else if (stile === "lungo") {
            forma = (<g>
              <path d="M45 64 Q50 62 55 64 L69 122 Q50 127 31 122 Z" fill={colore}/>
              <path d="M50 64 L59 122 Q50 125 41 122 Z" fill={luce}/></g>);
          } else if (stile === "svasato") {
            forma = (<g>
              <path d="M44 64 Q50 62 56 64 L72 113 Q50 120 28 113 Z" fill={colore}/>
              <path d="M50 64 L61 113 Q50 117 39 113 Z" fill={luce}/></g>);
          } else if (stile === "tutu") {
            forma = (<g>
              {/* corpetto/body attillato dalle spalle alla vita */}
              <path d="M44 64 Q50 62 56 64 L55 86 L45 86 Z" fill={colore}/>
              {/* gonnellino che copre i fianchi e arriva alle gambe (niente stacco) */}
              <path d="M30 86 Q50 81 70 86 L73 105 Q50 112 27 105 Z" fill={colore}/>
              {/* balza del tutù: volant svasati a strati */}

              {/* riga vita + luce */}
              <path d="M45 86 Q50 89 55 86" fill="none" stroke="rgba(255,255,255,0.5)" strokeWidth="1.4"/>

              <path d="M50 86 L58 105 Q50 110 42 105 Z" fill={luce}/></g>);
          } else if (stile === "principessa") {
            forma = (<g>
              <circle cx="39" cy="70" r="6" fill={colore}/>
              <circle cx="61" cy="70" r="6" fill={colore}/>

          } else if (stile === "marinara") {
            forma = (<g>
              <path d="M44 64 Q50 62 56 64 L68 112 Q50 118 32 112 Z" fill={colore}/>

              <path d="M50 64 L60 112 Q50 116 40 112 Z" fill={luce}/></g>);
          } else if (stile === "balza") {
            forma = (<g>
              <path d="M44 64 Q50 62 56 64 L70 113 Q50 119 30 113 Z" fill={colore}/>
              <path d="M37 88 Q43.5 93 50 89 Q56.5 93 63 88" fill="none" stroke={luce} strokeWidth="2.6"/>
              <path d="M33 100 Q41.5 106 50 101 Q58.5 106 67 100" fill="none" stroke={luce} strokeWidth="2.8"/></g>);
          } else { // classico
            forma = (<g>
              <path d="M44 64 Q50 62 56 64 L67 110 Q50 116 33 110 Z" fill={colore}/>
              <path d="M50 64 L60 110 Q50 113 40 110 Z" fill={luce}/></g>);
          }

          // motivo decorativo sovrapposto
          let deco = null;
          const punti = [[44,82],[56,82],[50,92],[40,100],[60,100],[50,104]];
          if (motivo === "pois") {
            deco = punti.map(([x,y],i) => <circle key={i} cx={x} cy={y} r="2.2" fill="#fff" opacity="0.85"/>);
          } else if (motivo === "cuori") {
            deco = punti.map(([x,y],i) => <path key={i} d={dCuore(x,y,2.6)} fill="#fff" opacity="0.85"/>);
          } else if (motivo === "stelle") {
            deco = punti.map(([x,y],i) => <path key={i} d={dStella(x,y,2.6)} fill="#fff" opacity="0.92"/>);
          } else if (motivo === "fiori") {
            deco = punti.map(([x,y],i) => (
              <g key={i}>
                {[0,72,144,216,288].map((a,k) => {
                  const rad = a * Math.PI / 180;
                  return <circle key={k} cx={x + Math.cos(rad)*2.1} cy={y + Math.sin(rad)*2.1} r="1.3" fill="#fff" opacity="0.9"/>;
                })}
                <circle cx={x} cy={y} r="1.2" fill="#F7C948"/>
              </g>
            ));
          }

          return (<g>{forma}{deco}</g>);
        }

        // CAPELLI dietro al viso (forma + eventuali codini)
        function capelliDietro(stile, colore) {
          const scuro = scurisci(colore, 0.82);
          if (stile === "lungo") return (
            <path d="M26 38 Q24 18 50 16 Q76 18 74 38 L80 98 Q73 104 67 92 L66 46 Q50 40 34 46 L33 92 Q27 104 20 98 Z" fill={colore}/>);
          if (stile === "caschetto") return (
            <path d="M27 42 Q26 17 50 16 Q74 17 73 42 L73 60 Q69 66 63 59 L63 46 Q50 40 37 46 L37 59 Q31 66 27 60 Z" fill={colore}/>);
          return (<g>
            <path d="M27 40 Q25 19 50 17 Q75 19 73 40 L76 72 Q70 79 65 70 L64 46 Q50 40 36 46 L35 70 Q30 79 24 72 Z" fill={colore}/>
            <ellipse cx="20" cy="39" rx="7.5" ry="12" fill={scuro} transform="rotate(-16 20 39)"/>
            <ellipse cx="80" cy="39" rx="7.5" ry="12" fill={scuro} transform="rotate(16 80 39)"/></g>);

        // CAPELLI davanti (frangia + elastici)
        function capelliDavanti(stile, colore) {
          return (<g>
            <path d="M29.5 43 Q30 22 50 21 Q70 22 70.5 43 Q66 30 52 30 Q45 30 41 35 Q37 30 29.5 43 Z" fill={colore}/>

        // OCCHI (tipo + colore)
        function renderOcchi(tipo, colore) {
          if (tipo === "felici") return (<g>
            <path d="M38 46 Q42 41.5 46 46" fill="none" stroke={colore} strokeWidth="2.2" strokeLinecap="round"/>
            <path d="M54 46 Q58 41.5 62 46" fill="none" stroke={colore} strokeWidth="2.2" strokeLinecap="round"/></g>);
          if (tipo === "stellati") return (<g>
            <path d={dStella(42, 45, 4.2)} fill={colore}/>
            <path d={dStella(58, 45, 4.2)} fill={colore}/></g>);

            <ellipse cx="42" cy="45" rx="3.4" ry="4" fill={colore}/>

        // OCCHIALI indossati sopra gli occhi
        function renderOcchiali(tipo, colore) {
          const Lx = 42, Rx = 58, y = 45.5, r = 5.6;
          const telaio = (<g stroke={colore} strokeWidth="1.8" fill="none" strokeLinecap="round">
            <line x1={Lx - r} y1={y - 1} x2="30" y2={y - 2}/>
            <line x1={Rx + r} y1={y - 1} x2="70" y2={y - 2}/>
            <line x1={Lx + r} y1={y} x2={Rx - r} y2={y}/></g>);
          if (tipo === "sole") return (<g>{telaio}
            <circle cx={Lx} cy={y} r={r} fill="#3a3a3a" opacity="0.82"/>
            <circle cx={Rx} cy={y} r={r} fill="#3a3a3a" opacity="0.82"/></g>);
          if (tipo === "quad") return (<g>{telaio}
            <rect x={Lx - r} y={y - r * 0.78} width={r * 2} height={r * 1.56} rx="1.6" fill="rgba(255,255,255,0.12)" stroke={colore} strokeWidth="2"/>
            <rect x={Rx - r} y={y - r * 0.78} width={r * 2} height={r * 1.56} rx="1.6" fill="rgba(255,255,255,0.12)" stroke={colore} strokeWidth="2"/></g>);
          if (tipo === "cuore") return (<g>{telaio}
            <path d={dCuore(Lx, y, 5)} fill="rgba(226,125,143,0.18)" stroke={colore} strokeWidth="1.8"/>
            <path d={dCuore(Rx, y, 5)} fill="rgba(226,125,143,0.18)" stroke={colore} strokeWidth="1.8"/></g>);
          if (tipo === "stella") return (<g>{telaio}
            <path d={dStella(Lx, y, 6)} fill="rgba(244,169,61,0.18)" stroke={colore} strokeWidth="1.5"/>
            <path d={dStella(Rx, y, 6)} fill="rgba(244,169,61,0.18)" stroke={colore} strokeWidth="1.5"/></g>);
          if (tipo === "gatto") return (<g>{telaio}
            <path d={`M${Lx - r} ${y} Q${Lx - r - 1} ${y - r} ${Lx} ${y - r * 0.7} Q${Lx + r} ${y - r * 0.5} ${Lx + r} ${y} Q${Lx} ${y + r * 0.7} ${Lx - r} ${y} Z`} fill="rgba(192,64,138,0.14)" stroke={colore} strokeWidth="1.8"/>
            <path d={`M${Rx - r} ${y} Q${Rx} ${y + r * 0.7} ${Rx + r} ${y} Q${Rx + r + 1} ${y - r} ${Rx} ${y - r * 0.7} Q${Rx - r} ${y - r * 0.5} ${Rx - r} ${y} Z`} fill="rgba(192,64,138,0.14)" stroke={colore} strokeWidth="1.8"/></g>);
          return (<g>{telaio}
            <circle cx={Lx} cy={y} r={r} fill="rgba(255,255,255,0.10)" stroke={colore} strokeWidth="2"/>
            <circle cx={Rx} cy={y} r={r} fill="rgba(255,255,255,0.10)" stroke={colore} strokeWidth="2"/></g>);
        }

        let _avatarSeq = 0;
        function Avatar({ equipped, size = 150 }) {

          const uid = uidRef.current;

          const capObj  = SHOP.capelli.find(c => c.id === equipped.capelli) || SHOP.capelli[0];
          const occObj  = SHOP.occhi.find(o => o.id === equipped.occhi) || SHOP.occhi[0];

          return (

              <svg viewBox="0 0 100 132" className="absolute z-10" style={{ left:"50%", top:"9%", transform:"translateX(-50%)", width:size*0.7 }}>
                <defs>
                  <radialGradient id={`skin${uid}`} cx="42%" cy="34%" r="70%">
                    <stop offset="0%"   stopColor="#FCDCBE"/>
                    <stop offset="60%"  stopColor="#F4C49C"/>
                    <stop offset="100%" stopColor="#E7B187"/>

                {/* ombra di contatto a terra */}

                {/* gambe + scarpe */}
                <rect x="42" y="104" width="6.5" height="16" rx="3.2" fill="#F4C49C"/>
                <rect x="51.5" y="104" width="6.5" height="16" rx="3.2" fill="#F4C49C"/>
                <ellipse cx="45" cy="121" rx="6" ry="3.6" fill="#E27D8F"/>
                <ellipse cx="55" cy="121" rx="6" ry="3.6" fill="#E27D8F"/>
                <ellipse cx="45" cy="119.6" rx="4" ry="1.5" fill="#fff" opacity="0.28"/>
                <ellipse cx="55" cy="119.6" rx="4" ry="1.5" fill="#fff" opacity="0.28"/>

                {/* braccia (maniche) + manine */}
                <path d="M40 74 Q29 82 31 98" stroke={vC} strokeWidth="7" fill="none" strokeLinecap="round"/>

                <path d="M61 42.4 L63.4 40.9 M59.8 41.4 L61.8 39.7" stroke="#3a2a22" strokeWidth="1.1" strokeLinecap="round"/>

                {/* naso + bocca */}

              </svg>
              {acc && <span className="absolute z-30" style={{ right:"6%", bottom:"30%", fontSize:size*0.2 }}>{acc.emoji}</span>}
              {pet && <span className="absolute z-30 saltello" style={{ left:"7%", bottom:"6%", fontSize:size*0.22 }}>{pet.emoji}</span>}
              {notte && <div className="absolute inset-0 pointer-events-none" style={{ boxShadow:"inset 0 0 40px rgba(0,0,0,0.25)" }}/>}

        /* =========================================================
           STRUMENTI VISIVI DIDATTICI
        ==========================================================*/
        // Cornice del 10 (ten-frame). Mostra "a" puntini di un colore,
        // poi "b" di un secondo colore; gli ultimi "crossLast" sono tolti.
        function CorniceDieci({ a = 0, b = 0, crossLast = 0, evidenziaDieci = false }) {
          const tot = a + b;
          const nFrames = Math.max(1, Math.ceil(tot / 10));
          const colA = "#5E9E4A", colB = "#F2994A";
          const celle = [];
          for (let i = 0; i < nFrames * 10; i++) {
            const acceso = i < tot;
            const isB = i >= a;
            const tolto = acceso && (i >= tot - crossLast);
            // evidenzia le caselle che completano la prima decina (da 'a' a 10)
            const ponte = evidenziaDieci && i >= a && i < 10 && i < tot;
            celle.push({ i, acceso, isB, tolto, ponte });
          }
          const frames = [];
          for (let f = 0; f < nFrames; f++) frames.push(celle.slice(f * 10, f * 10 + 10));

          return (
            <div className="flex flex-wrap justify-center gap-3">
              {frames.map((frame, fi) => (
                <div key={fi} className="grid grid-rows-2 grid-flow-col gap-1.5 p-2.5 bg-white rounded-2xl shadow-sm border-2 border-prato/20">
                  {frame.map(c => (
                    <div key={c.i}
                      className={`w-7 h-7 sm:w-8 sm:h-8 rounded-xl flex items-center justify-center transition-all duration-300
                        ${c.ponte ? "ring-2 ring-miele ring-offset-1" : ""}`}
                      style={{ background: c.acceso ? (c.isB ? colB : colA) : "#F1EEE6",
                               opacity: c.tolto ? 0.28 : 1 }}>
                      {c.tolto && <span className="text-white font-black text-sm">✕</span>}
                    </div>
                  ))}
                </div>
              ))}
            </div>
          );
        }

        // LINEA DEL 20 (stile metodo Bortolato): file da 10, raggruppate 5+5.
        // Addizione: riempie 'big' (verde) poi 'small' (arancio) -> si legge il totale a colpo d'occhio.
        // Sottrazione: riempie 'big' e barra gli ultimi 'removed' (resta visibile quel che avanza).
        function Linea20({ big = 0, small = 0, removed = 0 }) {
          const tot = big + small;
          const nFile = Math.max(2, Math.ceil(tot / 10));
          const colA = "#5E9E4A", colB = "#F2994A";
          const pallina = (i) => {
            const acceso = i < tot;
            const isB = i >= big;
            const tolto = acceso && i >= tot - removed;
            return (
              <div key={i} className="w-6 h-6 sm:w-7 sm:h-7 rounded-full flex items-center justify-center transition-colors duration-300 border border-black/5"
                   style={{ background: acceso ? (isB ? colB : colA) : "#EEEAE0", opacity: tolto ? 0.3 : 1 }}>
                {tolto && <span className="text-white font-black text-[11px]">✕</span>}
              </div>
            );
          };
          const fila = (start) => (
            <div className="flex gap-1.5 items-center">
              {Array.from({ length: 5 }, (_, k) => pallina(start + k))}
              <div className="w-3" />
              {Array.from({ length: 5 }, (_, k) => pallina(start + 5 + k))}
            </div>
          );
          return (
            <div className="flex flex-col gap-1.5 bg-white rounded-2xl p-3 shadow-sm border-2 border-prato/20">
              {Array.from({ length: nFile }, (_, r) => <Fragment key={r}>{fila(r * 10)}</Fragment>)}
            </div>
          );
        }

        // Sequenza a "pietre" per i salti (avanti o indietro), con la rana.
        function PietreSalti({ seq, step, missingIndex, indietro }) {
          return (
            <div className="flex items-center justify-center flex-wrap gap-y-6 gap-x-1 mb-2 px-1">
              {seq.map((num, i) => (
                <Fragment key={i}>
                  <div className="relative">
                    {i === missingIndex && <span className="absolute -top-7 left-1/2 -translate-x-1/2 text-2xl saltello">🐸</span>}
                    <div className={`w-12 h-12 sm:w-14 sm:h-14 rounded-full flex items-center justify-center text-xl font-display font-extrabold shadow-md
                      ${i === missingIndex ? "bg-miele/25 border-4 border-dashed border-miele text-miele"
                                           : "bg-foglia text-white"}`}>
                      {i === missingIndex ? "?" : num}
                    </div>
                  </div>
                  {i < seq.length - 1 && (
                    <div className="flex flex-col items-center mx-0.5">
                      <span className={`text-xs font-extrabold ${indietro ? "text-bacca" : "text-foglia"}`}>
                        {indietro ? "−" : "+"}{step}
                      </span>
                      <span className="text-prato text-lg leading-none">{indietro ? "↩" : "↪"}</span>
                    </div>
                  )}
                </Fragment>
              ))}
            </div>
          );
        }

        // Linea dei numeri con archi di salto (per "conta in avanti" e "a ponte").
        function LineaConSalti({ min, max, archi, coloreArchi = "#5E9E4A" }) {
          const W = 320, H = 120, padX = 18, baseY = 92;
          const span = max - min;
          const x = n => padX + ((n - min) / span) * (W - padX * 2);
          const ticks = [];
          for (let n = min; n <= max; n++) ticks.push(n);
          return (
            <svg viewBox={`0 0 ${W} ${H}`} className="w-full max-w-[360px]" preserveAspectRatio="xMidYMid meet">
              {/* asse */}
              <line x1={padX} y1={baseY} x2={W - padX} y2={baseY} stroke="#CDBFAC" strokeWidth="3" strokeLinecap="round"/>
              {ticks.map(n => (
                <g key={n}>
                  <line x1={x(n)} y1={baseY - 6} x2={x(n)} y2={baseY + 6} stroke="#CDBFAC" strokeWidth="2.5"/>
                  <text x={x(n)} y={baseY + 22} textAnchor="middle" fontSize="11" fontWeight="700" fill="#7C6A58" fontFamily="Nunito">{n}</text>
                </g>
              ))}
              {/* archi di salto */}
              {archi.map((s, i) => {
                const x1 = x(s.from), x2 = x(s.to);
                const cx = (x1 + x2) / 2, cy = baseY - 38 - Math.min(20, Math.abs(s.to - s.from) * 4);
                const d = `M ${x1} ${baseY - 8} Q ${cx} ${cy} ${x2} ${baseY - 8}`;
                return (
                  <g key={i} className="arco-anim" style={{ animationDelay: `${i * 0.35}s` }}>
                    <path d={d} fill="none" stroke={coloreArchi} strokeWidth="3" strokeLinecap="round"/>
                    <text x={cx} y={cy - 4} textAnchor="middle" fontSize="13" fontWeight="800" fill={coloreArchi} fontFamily="Nunito">
                      {s.label}
                    </text>
                  </g>
                );
              })}
              {/* punti partenza/arrivo */}
              {archi.length > 0 && (
                <Fragment>
                  <circle cx={x(archi[0].from)} cy={baseY} r="6" fill="#5E9E4A"/>
                  <circle cx={x(archi[archi.length - 1].to)} cy={baseY} r="6" fill="#E27D8F"/>
                </Fragment>
              )}
            </svg>
          );
        }

        /* =========================================================
           UTILITÀ
        ==========================================================*/
        const rnd = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        const EMOJIS = ["🍎","🍓","🎈","🌸","🍄","🦋","🍬","🍩","🧸","🐥","🦁","🍦","🐢","🌻"];

        function generaOpzioni(corretto, passo = 1, quante = 3) {
          const set = new Set([corretto]);
          let guard = 0;
          while (set.size < quante && guard < 50) {
            guard++;
            const off = rnd(1, 3) * passo;
            const fake = Math.random() > 0.5 ? corretto + off : corretto - off;
            if (fake >= 0 && fake !== corretto) set.add(fake);
          }
          return Array.from(set).sort(() => Math.random() - 0.5);
        }

        // Salti per "contare in avanti" (sottrazione come addizione): da S a T.
        function saltiInAvanti(S, T) {
          const archi = []; let cur = S;
          if (cur % 10 !== 0 && Math.floor(T / 10) > Math.floor(cur / 10)) {
            const next10 = (Math.floor(cur / 10) + 1) * 10;
            archi.push({ from: cur, to: next10, label: "+" + (next10 - cur) }); cur = next10;
          }
          while (cur + 10 <= T) { archi.push({ from: cur, to: cur + 10, label: "+10" }); cur += 10; }
          if (cur < T) { archi.push({ from: cur, to: T, label: "+" + (T - cur) }); }
          return archi;
        }

        /* =========================================================
           COMPONENTE PRINCIPALE
        ==========================================================*/
        function MathGame() {
          const saved = store.load() || {};
          const [view, setView] = useState("home");          // home | gioca | armadio
          const [stageIdx, setStageIdx] = useState(0);
          const [correctInStage, setCorrectInStage] = useState(0);
          const [giro, setGiro] = useState(1);
          const [cap, setCap] = useState(20);
          const [showIntro, setShowIntro] = useState(true);

          const [problem, setProblem] = useState(null);
          const [userInput, setUserInput] = useState("");
          const [wrong, setWrong] = useState([]);
          const [phase, setPhase] = useState("playing");      // playing | win
          const [aiuto, setAiuto] = useState(false);          // visivo mostrato?
          const [usatoAiuto, setUsatoAiuto] = useState(false);// ha mai chiesto aiuto in QUESTO problema?
          const [microStep, setMicroStep] = useState(0);      // passo delle microdomande (Fai il 10!)
          const [message, setMessage] = useState("");
          const [emozione, setEmozione] = useState("🙂");
          const [toast, setToast] = useState(null);
          const [stageStats, setStageStats] = useState({ aMente: 0, conAiuto: 0, stelle: 0 });
          const [riepilogo, setRiepilogo] = useState(null);

          // persistenti
          const [stelle, setStelle] = useState(saved.stelle || 0);
          const [owned, setOwned] = useState(() => Array.from(new Set([...(saved.owned || []), ...GRATIS])));
          const [equipped, setEquipped] = useState(() => {
            const eq = { ...EQUIP_DEFAULT, ...(saved.equipped || {}) };
            // se un articolo equipaggiato non esiste più, torna al default di categoria
            ["sfondo","vestito","capelli","occhi","occhiali","cappello","accessorio","pet"].forEach(cat => {
              if (eq[cat] && !SHOP[cat].some(it => it.id === eq[cat])) eq[cat] = EQUIP_DEFAULT[cat];
            });
            return eq;
          });
          const [shopTab, setShopTab] = useState("vestito");
          const [zoomAvatar, setZoomAvatar] = useState(false);
          const [armadioFrom, setArmadioFrom] = useState("home"); // da dove si è aperto l'armadio
          const apriArmadio = (from) => { setArmadioFrom(from); setZoomAvatar(false); setView("armadio"); };

          // salva quando cambia qualcosa di persistente
          useEffect(() => { store.save({ stelle, owned, equipped }); }, [stelle, owned, equipped]);

          // --- TUTTO SCHERMO (Fullscreen API, con fallback webkit per iPad) ---
          const [isFs, setIsFs] = useState(false);
          useEffect(() => {
            const h = () => setIsFs(!!(document.fullscreenElement || document.webkitFullscreenElement));
            document.addEventListener("fullscreenchange", h);
            document.addEventListener("webkitfullscreenchange", h);
            return () => { document.removeEventListener("fullscreenchange", h); document.removeEventListener("webkitfullscreenchange", h); };
          }, []);
          function toggleFullscreen() {
            const el = document.documentElement;
            const fs = document.fullscreenElement || document.webkitFullscreenElement;
            try {
              if (!fs) {
                if (el.requestFullscreen) el.requestFullscreen();
                else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
              } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
              }
            } catch (e) {}
          }

          const stage = STAGES[stageIdx];

          /* ---------- GENERAZIONE PROBLEMI ---------- */
          function nuovoProblema(idx = stageIdx, rep = 0) {
            const key = STAGES[idx].key;
            const emoji = EMOJIS[rnd(0, EMOJIS.length - 1)];
            let p = { key, emoji, mode: "choice" };
            const C = cap;

            if (key === "add10") {
              const a = rnd(1, 8), b = rnd(1, Math.min(9 - a + 1, 10 - a));
              p = { ...p, a, b: Math.max(1, b), op: "+", ans: a + Math.max(1, b) };
              p.b = p.ans - a; p.options = generaOpzioni(p.ans);
            }
            else if (key === "bonds10") {
              const a = rnd(1, 9);
              p = { ...p, a, b: "?", op: "+", target: 10, ans: 10 - a, options: generaOpzioni(10 - a) };
            }
            else if (key === "doubles") {
              const a = rnd(2, Math.min(9, Math.floor(C / 2)));
              const near = Math.random() > 0.45;
              if (near) p = { ...p, a, b: a + 1, op: "+", ans: a + a + 1, doppio: a, near: true, options: generaOpzioni(a + a + 1) };
              else      p = { ...p, a, b: a,     op: "+", ans: a + a,     doppio: a, near: false, options: generaOpzioni(a + a) };
            }
            else if (key === "flip") {
              const big = rnd(5, 9);
              const small = rnd(1, 4);
              // presentiamo PICCOLO + GRANDE, così il "giro" ha senso
              p = { ...p, a: small, b: big, op: "+", ans: small + big, big, small, options: generaOpzioni(small + big) };
            }
            else if (key === "jumpFwd") {
              const step = [2, 3, 5, 10][rnd(0, 3)];
              const start = rnd(1, Math.max(1, Math.floor(C / 6)));
              const seq = [start, start + step, start + step * 2, start + step * 3];
              const mi = rnd(0, 3); const ans = seq[mi]; const seqShow = [...seq]; seqShow[mi] = "?";
              p = { ...p, seq: seqShow, step, ans, missingIndex: mi, indietro: false, options: generaOpzioni(ans, step) };
            }
            else if (key === "jumpBack") {
              const step = [2, 3, 5][rnd(0, 2)]; // niente passo 10: tiene i numeri amichevoli e mai negativi
              const start = rnd(step * 3 + 1, Math.max(step * 3 + 3, C));
              const seq = [start, start - step, start - step * 2, start - step * 3];
              const mi = rnd(0, 3); const ans = seq[mi]; const seqShow = [...seq]; seqShow[mi] = "?";
              p = { ...p, seq: seqShow, step, ans, missingIndex: mi, indietro: true, options: generaOpzioni(ans, step) };
            }
            else if (key === "sub10") {
              const a = rnd(5, C), b = rnd(1, a - 1);
              p = { ...p, a, b, op: "−", ans: a - b, options: generaOpzioni(a - b) };
            }
            else if (key === "makeTen") {
              let x, y;
              if (Math.random() < 0.5) {
                // unità + unità con riporto (es. 5 + 8)
                const b1 = rnd(6, 9);
                const s1 = rnd(Math.max(2, 11 - b1), b1);
                x = s1; y = b1;                       // mostriamo piccolo + grande (gira i numeri)
              } else {
                // numero "oltre il 10" + unità (es. 12 + 6) — il totale resta entro il 20
                const teen = rnd(11, 15);
                const u = rnd(2, Math.min(9, 20 - teen));
                x = teen; y = u;
              }
              const ans = x + y;
              p = { ...p, a: x, b: y, op: "+", ans, big: Math.max(x, y), small: Math.min(x, y), options: generaOpzioni(ans) };
            }
            else if (key === "countUp") {
              const S = rnd(4, 9);
              const T = rnd(11, Math.min(C, 18));
              p = { ...p, a: T, b: S, op: "−", ans: T - S, from: S, to: T, options: generaOpzioni(T - S) };
            }
            else if (key === "bridgeSub") {
              const T = rnd(11, Math.min(C, 18));
              const units = T - 10;
              const b = rnd(units + 1, units + 9 > 9 ? 9 : units + 9);
              const ans = T - b;
              p = { ...p, a: T, b, op: "−", ans, units, resto: b - units, options: generaOpzioni(ans) };
            }
            else if (key === "groups") {
              const g = rnd(2, 4), per = rnd(2, 5);
              p = { ...p, a: g, b: per, op: "×", ans: g * per, options: generaOpzioni(g * per, per) };
            }
            else if (key === "share") {
              const per = rnd(2, 4), each = rnd(2, 4);
              const tot = per * each;
              p = { ...p, a: tot, b: per, op: "÷", ans: each, options: generaOpzioni(each) };
            }

            // PROGRESSIONE INTERNA A OGNI TAPPA (3 livelli):
            //  - primi 2 esercizi: GUIDATO (aiuto acceso, risposta multipla; "Fai il 10!" in 2 microdomande)
            //  - poi: PROVA DA SOLA (aiuto nascosto ma richiamabile, risposta multipla)
            //  - ultimi 2 esercizi: SFIDA (niente scelte: si scrive la risposta col tastierino)
            // Nei salti la sequenza È l'esercizio, quindi l'aiuto non si nasconde (ma la sfida con tastiera resta).
            const haAiutoOpzionale = !["jumpFwd", "jumpBack"].includes(key);
            const guidato = rep < 2;
            const sfida = rep >= PER_STAGE - 2;       // ultime 2 domande
            const aiutoDefault = haAiutoOpzionale && guidato;
            p.mode = sfida ? "input" : "choice";       // le microdomande restano comunque a scelta
            if (p.micro) p.mode = "choice";
            p.fase = sfida ? "sfida" : (haAiutoOpzionale ? (guidato ? "guidato" : "prova") : null);
            setMicroStep(0);
            setProblem(p);
            setUserInput("");
            setWrong([]);
            setPhase("playing");
            setAiuto(aiutoDefault);
            setUsatoAiuto(aiutoDefault);
            setMessage(STAGES[idx].strategia);
            setEmozione("🙂");
          }

          /* ---------- RISPOSTA ---------- */
          function valuta(val) {
            if (val === "" || val === null || phase !== "playing") return;
            const inMicro1 = problem.micro && microStep === 0;
            const bersaglio = inMicro1 ? problem.manca : problem.ans;
            const giusto = parseInt(val) === bersaglio;
            if (!giusto) {
              setWrong(w => [...w, parseInt(val)]);
              setUserInput("");
              setEmozione("🤔");
              setMessage("Quasi! Respira e riprova con calma 💛");
              if (!aiuto) { setAiuto(true); setUsatoAiuto(true); }
              return;
            }
            // PRIMA microdomanda giusta -> passa alla seconda (la tappa NON è ancora finita)
            if (inMicro1) {
              setMicroStep(1);
              setWrong([]); setUserInput("");
              setEmozione("😄");
              setMessage(`Bravissima! ${problem.a} + ${problem.manca} fa 10. E adesso, quanto fa 10 + ${problem.resto}?`);
              setToast({ text: "Giusto! 👍", bonus: false });
              setTimeout(() => setToast(null), 950);
              return;
            }
            // CORRETTO (domanda intera, o seconda microdomanda)
            const bonus = usatoAiuto ? 0 : 1;
            const guadagno = 1 + bonus;
            setStelle(s => s + guadagno);
            const nuoviStats = {
              aMente: stageStats.aMente + (bonus ? 1 : 0),
              conAiuto: stageStats.conAiuto + (bonus ? 0 : 1),
              stelle: stageStats.stelle + guadagno,
            };
            setStageStats(nuoviStats);
            setEmozione("😄");
            setPhase("win");
            setMessage(bonus ? "Bravissima! L'hai fatto a mente! 🌟" : "Perfetto! 🎉");
            setToast({ text: bonus ? `+${guadagno} ⭐  ·  a mente!` : `+${guadagno} ⭐`, bonus: !!bonus });

            setTimeout(() => {
              setToast(null);
              const corrette = correctInStage + 1;
              if (corrette >= PER_STAGE) {
                setRiepilogo({
                  nome: stage.nome, icona: stage.icona,
                  aMente: nuoviStats.aMente, conAiuto: nuoviStats.conAiuto,
                  stelle: nuoviStats.stelle, totale: nuoviStats.aMente + nuoviStats.conAiuto,
                  isLast: stageIdx + 1 >= STAGES.length,
                });
                setView("riepilogo");
              } else {
                setCorrectInStage(corrette);
                nuovoProblema(stageIdx, corrette);
              }
            }, 1300);
          }

          function numpad(v) {
            if (phase !== "playing") return;
            if (v === "C") setUserInput("");
            else if (v === "OK") valuta(userInput);
            else if (userInput.length < 3) setUserInput(userInput + v);
          }

          /* ---------- ARMADIO: compra / equipaggia ---------- */
          function compra(cat, item) {
            if (owned.includes(item.id)) return;
            if (stelle < item.prezzo) { setToast({ text: "Ti servono più ⭐", bonus:false }); setTimeout(()=>setToast(null),1200); return; }
            setStelle(s => s - item.prezzo);
            setOwned(o => [...o, item.id]);
            setEquipped(e => ({ ...e, [cat]: item.id }));
          }
          function equipaggia(cat, item) {
            // toggle: gli articoli "rimovibili" (occhiali, cappello, accessori, amici) si possono togliere
            setEquipped(e => {
              const giaIndossato = e[cat] === item.id;
              if (giaIndossato && RIMOVIBILI.includes(cat)) return { ...e, [cat]: null };
              return { ...e, [cat]: item.id };
            });
          }

          // legge ad alta voce un testo in italiano (Web Speech API)
          function leggi(testo) {
            try {
              if (!("speechSynthesis" in window) || !testo) return;
              window.speechSynthesis.cancel();
              const u = new SpeechSynthesisUtterance(String(testo).replace(/[🌻🌟🎉💛💪🌱🧠✨🌳🐸🪜🌉🤝👯🔄🍃🍪🧺🌀]/g, ""));
              u.lang = "it-IT";
              u.rate = 0.92; u.pitch = 1.08;
              const voci = window.speechSynthesis.getVoices();
              const itVoce = voci.find(v => /it[-_]/i.test(v.lang));
              if (itVoce) u.voice = itVoce;
              window.speechSynthesis.speak(u);
            } catch (e) {}
          }

          /* =====================================================
             SCHERMATE
          ======================================================*/

          // --- HOME / mappa del giardino ---
          if (view === "home") {
            return (
              <div className="sfondo-giardino min-h-screen flex flex-col items-center px-4 py-6 font-body">
                <Header stelle={stelle} equipped={equipped} onArmadio={() => apriArmadio("home")} onFullscreen={toggleFullscreen} isFs={isFs} compact />
                <div className="w-full max-w-md text-center mt-2 mb-5 entra">
                  <button onClick={() => setZoomAvatar(true)} className="flex flex-col items-center mb-2 galleggia active:scale-95 transition-transform">
                    <Avatar equipped={equipped} size={88} />
                    <span className="text-xs font-bold text-terra/50 mt-1">tocca per ingrandire 🔍</span>
                  </button>
                  <h1 className="font-display text-4xl font-extrabold text-foglia">Il Giardino dei Numeri</h1>
                  <p className="text-terra/70 font-bold mt-1">
                    {giro > 1 ? `Giro ${giro} · numeri fino a ${cap} 🌀` : "Scegli un sentiero e coltiviamo i numeri 🌿"}
                  </p>
                </div>

                <div className="w-full max-w-md grid grid-cols-2 gap-3 entra">
                  {STAGES.map((s, i) => (
                    <button key={s.key}
                      onClick={() => { setStageIdx(i); setCorrectInStage(0); setShowIntro(true); setView("gioca"); }}
                      className="bg-white rounded-3xl p-4 text-left shadow-sm border-2 border-prato/15 active:scale-95 transition-transform">
                      <div className="text-3xl mb-1">{s.icona}</div>
                      <div className="font-display font-extrabold text-terra leading-tight">{s.nome}</div>
                      <div className="text-xs text-terra/60 font-bold mt-0.5">{s.concetto}</div>
                    </button>
                  ))}
                </div>

                <button onClick={() => apriArmadio("home")}
                  className="mt-6 flex items-center gap-2 bg-bacca text-white px-7 py-3.5 rounded-full font-display font-extrabold text-lg shadow-md active:scale-95 transition-transform">
                  <Shirt className="w-6 h-6"/> Vesti la tua Bambina
                </button>

                {zoomAvatar && (
                  <div className="fixed inset-0 z-50 flex flex-col items-center justify-center px-6"
                       style={{ background: "rgba(124,106,88,0.55)" }} onClick={() => setZoomAvatar(false)}>
                    <div className="entra" onClick={(e) => e.stopPropagation()}>
                      <Avatar equipped={equipped} size={Math.min(320, window.innerWidth - 60)} />
                      <div className="flex gap-3 mt-5 justify-center">
                        <button onClick={() => apriArmadio("home")}
                          className="bg-foglia text-white px-6 py-3 rounded-full font-display font-extrabold text-lg shadow-md active:scale-95 flex items-center gap-2">
                          <Shirt className="w-5 h-5"/> Cambia look
                        </button>
                        <button onClick={() => setZoomAvatar(false)}
                          className="bg-white text-terra px-6 py-3 rounded-full font-display font-extrabold text-lg shadow-md active:scale-95">
                          Chiudi
                        </button>
                      </div>
                    </div>
                  </div>
                )}
                {toast && <Toast {...toast} />}
              </div>
            );
          }

          // --- ARMADIO (negozio) ---
          if (view === "armadio") {
            const lista = SHOP[shopTab];
            return (
              <div className="sfondo-giardino min-h-screen flex flex-col items-center px-4 py-5 font-body">
                <div className="w-full max-w-md flex items-center justify-between mb-3">
                  <button onClick={() => setView(armadioFrom)} className="bg-white w-11 h-11 rounded-full flex items-center justify-center shadow-sm border-2 border-prato/15 active:scale-90">
                    <X className="w-5 h-5 text-terra"/>
                  </button>
                  <div className="flex items-center gap-1.5 bg-white px-4 py-2 rounded-full shadow-sm border-2 border-miele/30">
                    <Star className="w-5 h-5 text-miele"/>
                    <span className="font-display font-extrabold text-terra text-lg">{stelle}</span>
                  </div>
                </div>

                <button onClick={() => setZoomAvatar(true)} className="flex flex-col items-center active:scale-95 transition-transform">
                  <Avatar equipped={equipped} size={170}/>
                  <span className="text-[11px] font-bold text-terra/45 mt-1">tocca per ingrandire 🔍</span>
                </button>
                <h2 className="font-display font-extrabold text-2xl text-foglia mt-3 mb-2">L'Armadio 👗</h2>

                <div className="w-full max-w-md flex gap-2 overflow-x-auto pb-2 mb-3">
                  {CATEGORIE.map(c => (
                    <button key={c.key} onClick={() => setShopTab(c.key)}
                      className={`flex-shrink-0 px-4 py-2 rounded-full font-display font-extrabold text-sm transition-all border-2
                        ${shopTab === c.key ? "bg-foglia text-white border-foglia" : "bg-white text-terra/70 border-prato/15"}`}>
                      {c.icona} {c.label}
                    </button>
                  ))}
                </div>

                <div className="w-full max-w-md grid grid-cols-3 gap-3 pb-6">
                  {lista.map(item => {
                    const ho = owned.includes(item.id);
                    const indossato = equipped[shopTab] === item.id;
                    const posso = stelle >= item.prezzo;
                    return (
                      <button key={item.id}
                        onClick={() => ho ? equipaggia(shopTab, item) : compra(shopTab, item)}
                        className={`relative rounded-3xl p-2.5 flex flex-col items-center gap-1.5 shadow-sm border-2 transition-all active:scale-95
                          ${indossato ? "bg-prato/15 border-foglia" : "bg-white border-prato/10"}
                          ${!ho && !posso ? "opacity-60" : ""}`}>
                        <div className="w-14 h-14 rounded-2xl flex items-center justify-center text-3xl overflow-hidden"
                          style={{ background:
                            shopTab === "sfondo" ? (SCENE[item.id] && SCENE[item.id].grad)
                            : shopTab === "capelli" ? item.colore
                            : "#FBF6EC" }}>
                          {(shopTab === "cappello" || shopTab === "accessorio" || shopTab === "pet") && item.emoji}
                          {shopTab === "sfondo" && "🏞️"}
                          {shopTab === "vestito" && (
                            <svg viewBox="18 58 64 70" className="w-14 h-14">{renderVestito(item.stile, item.colore, item.motivo)}</svg>
                          )}
                          {shopTab === "capelli" && "💇"}
                          {shopTab === "occhi" && (
                            <svg viewBox="36 40 28 11" className="w-12 h-12">{renderOcchi(item.tipo, item.colore)}</svg>
                          )}
                          {shopTab === "occhiali" && (
                            <svg viewBox="29 38 42 16" className="w-14 h-9">{renderOcchiali(item.tipo, item.colore)}</svg>
                          )}
                        </div>
                        <div className="text-[11px] font-extrabold text-terra leading-tight text-center">{item.nome}</div>
                        {ho ? (
                          <div className={`text-[11px] font-extrabold ${indossato ? "text-foglia" : "text-terra/40"}`}>
                            {indossato ? "✓ Indossato" : "Indossa"}
                          </div>
                        ) : (
                          <div className={`flex items-center gap-1 text-[11px] font-extrabold ${posso ? "text-miele" : "text-terra/40"}`}>
                            {posso ? <Star className="w-3 h-3"/> : <Lock className="w-3 h-3"/>} {item.prezzo}
                          </div>
                        )}
                      </button>
                    );
                  })}
                </div>
                {zoomAvatar && (
                  <div className="fixed inset-0 z-50 flex flex-col items-center justify-center px-6"
                       style={{ background: "rgba(124,106,88,0.55)" }} onClick={() => setZoomAvatar(false)}>
                    <div className="entra" onClick={(e) => e.stopPropagation()}>
                      <Avatar equipped={equipped} size={Math.min(320, window.innerWidth - 60)} />
                      <div className="flex justify-center mt-5">
                        <button onClick={() => setZoomAvatar(false)}
                          className="bg-white text-terra px-8 py-3 rounded-full font-display font-extrabold text-lg shadow-md active:scale-95">
                          Chiudi
                        </button>
                      </div>
                    </div>
                  </div>
                )}
                {toast && <Toast {...toast} />}
              </div>
            );
          }

          // --- RIEPILOGO DI FINE TAPPA ---
          if (view === "riepilogo" && riepilogo) {
            const r = riepilogo;
            const lode = r.aMente >= 4 ? "Wow, quasi tutto a mente! Sei una maga dei numeri 🌟"
                       : r.aMente >= 2 ? "Stai imparando a farne sempre di più a mente! 💪"
                       : "Bravissima! Gli aiutini servono proprio per imparare: piano piano ne farai di più a mente 🌱";
            const continua = () => {
              setRiepilogo(null);
              if (r.isLast) {
                setGiro(g => g + 1); setCap(c => c + 10);
                setStageIdx(0); setCorrectInStage(0); setShowIntro(true); setView("home");
              } else {
                setStageIdx(stageIdx + 1); setCorrectInStage(0); setShowIntro(true); setView("gioca");
              }
            };
            return (
              <div className="sfondo-giardino min-h-screen flex flex-col items-center justify-center px-6 py-8 font-body text-center">
                <div className="text-6xl mb-2 respiro">{r.icona}</div>
                <h1 className="font-display text-3xl sm:text-4xl font-extrabold text-foglia mb-1">Sentiero completato!</h1>
                <p className="text-terra/70 font-bold text-lg mb-6">{r.nome}</p>

                <div className="bg-white rounded-3xl px-6 py-6 shadow-sm border-2 border-prato/15 w-full max-w-sm mb-5 entra">
                  <div className="flex items-center justify-center gap-2 mb-5">
                    <Star className="w-7 h-7 text-miele"/>
                    <span className="font-display font-extrabold text-2xl text-terra">+{r.stelle} stelle</span>
                  </div>
                  <div className="flex gap-3">
                    <div className="flex-1 bg-prato/10 rounded-2xl py-4">
                      <div className="text-3xl mb-1">🧠</div>
                      <div className="font-display font-extrabold text-3xl text-foglia">{r.aMente}<span className="text-lg text-terra/40">/{r.totale}</span></div>
                      <div className="text-sm font-extrabold text-terra/60 mt-1">a mente</div>
                    </div>
                    <div className="flex-1 bg-miele/10 rounded-2xl py-4">
                      <div className="text-3xl mb-1">🌱</div>
                      <div className="font-display font-extrabold text-3xl text-yellow-600">{r.conAiuto}<span className="text-lg text-terra/40">/{r.totale}</span></div>
                      <div className="text-sm font-extrabold text-terra/60 mt-1">con l'aiutino</div>
                    </div>
                  </div>
                  {/* barra "a mente" */}
                  <div className="w-full bg-prato/10 h-3 rounded-full mt-5 overflow-hidden">
                    <div className="bg-foglia h-full transition-all duration-700" style={{ width: `${(r.aMente / Math.max(1, r.totale)) * 100}%` }}/>
                  </div>
                </div>

                <p className="text-terra font-bold text-lg sm:text-xl max-w-sm mb-7">{lode}</p>

                <button onClick={continua}
                  className="bg-foglia text-white px-8 py-4 rounded-full font-display font-extrabold text-xl shadow-md flex items-center gap-2 active:scale-95 transition-transform">
                  {r.isLast ? "🌀 Nuovo giro!" : "Avanti →"}
                </button>
              </div>
            );
          }

          // --- INTRO DI TAPPA ---
          if (showIntro) {
            return (
              <div className="sfondo-giardino min-h-screen flex flex-col items-center justify-center px-6 py-8 font-body text-center">
                <div className="text-6xl mb-3 respiro">{stage.icona}</div>
                <h1 className="font-display text-4xl font-extrabold text-foglia mb-2">{stage.nome}</h1>
                <p className="text-terra/70 font-bold text-lg mb-6">{stage.concetto}</p>
                <div className="bg-white rounded-3xl px-6 py-5 shadow-sm border-2 border-miele/20 max-w-sm mb-8">
                  <div className="flex items-center gap-2 justify-center mb-2 text-miele">
                    <Lightbulb className="w-6 h-6"/><span className="font-display font-extrabold">Il trucco</span>
                  </div>
                  <p className="text-terra font-bold text-lg sm:text-xl leading-relaxed">{stage.strategia}</p>
                </div>
                <button onClick={() => { setStageStats({ aMente: 0, conAiuto: 0, stelle: 0 }); setShowIntro(false); nuovoProblema(stageIdx, 0); }}
                  className="bg-foglia text-white px-8 py-4 rounded-full font-display font-extrabold text-xl shadow-md flex items-center gap-2 active:scale-95 transition-transform">
                  <Play className="w-6 h-6"/> Cominciamo!
                </button>
                <button onClick={() => setView("home")} className="mt-4 text-terra/50 font-bold underline">torna al giardino</button>
              </div>
            );
          }

          // --- SCHERMATA DI GIOCO ---
          if (!problem) return null;
          const usaCornice = ["add10", "sub10"].includes(problem.key);
          const usaPietre  = ["jumpFwd", "jumpBack"].includes(problem.key);
          const usaLinea   = ["countUp", "bridgeSub"].includes(problem.key);
          const usaGruppi  = problem.key === "groups";
          const usaShare   = problem.key === "share";
          const usaBonds   = problem.key === "bonds10";
          const usaDoppi   = problem.key === "doubles";
          const usaFlip    = problem.key === "flip";
          const usaFaiDieci = problem.key === "makeTen";
          const isInput    = problem.mode === "input";
          const inMicro1   = problem.micro && microStep === 0;     // prima microdomanda (quanto manca a 10)
          const opzioniMostrate = inMicro1 ? problem.optManca : problem.options;
          const boxClass = `min-w-[56px] text-center border-b-[6px] pb-1 ${userInput ? "border-foglia text-foglia" : "border-prato/20 text-prato/30"}`;

          return (
            <div className="sfondo-giardino min-h-screen flex flex-col items-center px-4 py-4 font-body">
              <Header stelle={stelle} equipped={equipped}
                      stage={stage} correctInStage={correctInStage} onFullscreen={toggleFullscreen} isFs={isFs} bloccato />

              {/* fumetto del girasole guida */}
              <div className="w-full max-w-md bg-white rounded-3xl px-5 py-4 shadow-sm border-2 border-prato/15 mt-3 mb-3 flex items-center gap-3 entra">
                <span className="text-4xl">{phase === "win" ? "🌻✨" : (emozione === "🤔" ? "🌻💛" : "🌻")}</span>
                <p className="font-bold text-terra/90 text-lg sm:text-xl leading-snug flex-1">{message}</p>
                <button onClick={() => leggi(message)} aria-label="Ascolta il suggerimento"
                  className="flex-shrink-0 w-11 h-11 rounded-full bg-cielo/30 text-foglia flex items-center justify-center active:scale-90 transition-transform">
                  <Speaker className="w-5 h-5"/>
                </button>
              </div>

              {/* indicatore di fase: guidato / prova / sfida */}
              {problem.fase && phase !== "win" && (
                <div className={`mb-3 px-5 py-2 rounded-full text-base font-display font-extrabold entra
                  ${problem.fase === "guidato" ? "bg-prato/20 text-foglia"
                    : problem.fase === "sfida" ? "bg-bacca/20 text-bacca"
                    : "bg-miele/25 text-yellow-700"}`}>
                  {problem.fase === "guidato" ? "🌳 Impariamo insieme"
                    : problem.fase === "sfida" ? "⌨️ Sfida: scrivi tu la risposta!"
                    : "✨ Prova da sola · +2 ⭐ se ci riesci!"}
                </div>
              )}

              {/* AREA VISIVA */}
              <div className="w-full max-w-md flex flex-col items-center min-h-[150px] justify-center mb-3">
                {!aiuto && (usaCornice || usaLinea || usaGruppi || usaShare || usaBonds || usaDoppi || usaFlip || usaFaiDieci) && (
                  <button onClick={() => { setAiuto(true); setUsatoAiuto(true); }}
                    className="flex items-center gap-2 bg-miele/25 text-yellow-700 px-6 py-3.5 rounded-full font-display font-extrabold text-lg shadow-sm active:scale-95 lampeggia">
                    <Lightbulb className="w-6 h-6"/> Mostrami l'aiutino 🌱
                  </button>
                )}

                {aiuto && usaBonds && (
                  <div className="entra"><CorniceDieci a={problem.a} b={problem.ans} evidenziaDieci /></div>
                )}
                {aiuto && usaFlip && (
                  <div className="entra flex flex-col items-center">
                    <span className="text-base sm:text-lg font-extrabold text-foglia mb-1">
                      Parti dal grande ({problem.big}) e fai {problem.small} {problem.small === 1 ? "saltino" : "saltini"} in avanti
                    </span>
                    <LineaConSalti
                      min={Math.max(0, problem.big - 1)} max={problem.ans + 1}
                      archi={Array.from({ length: problem.small }, (_, i) => ({ from: problem.big + i, to: problem.big + i + 1, label: "+1" }))} />
                  </div>
                )}
                {aiuto && usaDoppi && (
                  <div className="entra flex flex-col items-center gap-2">
                    <div className="flex items-center justify-center flex-wrap gap-2">
                      <CorniceDieci a={problem.doppio} />
                      <span className="font-display text-2xl text-foglia font-extrabold">+</span>
                      <CorniceDieci a={problem.doppio} />
                      {problem.near && (
                        <Fragment>
                          <span className="font-display text-2xl text-bacca font-extrabold">+</span>
                          <div className="w-7 h-7 sm:w-8 sm:h-8 rounded-xl bg-bacca ring-2 ring-bacca ring-offset-2 pop"/>
                        </Fragment>
                      )}
                    </div>
                    <span className="text-base sm:text-lg font-extrabold text-terra/60 text-center px-2">
                      {problem.near
                        ? `Due gemelli da ${problem.doppio} (cioè ${problem.doppio + problem.doppio}) e poi uno in più!`
                        : `Due gemelli uguali da ${problem.doppio}`}
                    </span>
                  </div>
                )}
                {aiuto && usaCornice && problem.op === "+" && (
                  <div className="entra flex flex-col items-center gap-2">
                    <span className="text-base sm:text-lg font-extrabold text-foglia">Quanti puntini in tutto?</span>
                    <Linea20 big={Math.max(problem.a, problem.b)} small={Math.min(problem.a, problem.b)} />
                  </div>
                )}
                {aiuto && usaFaiDieci && (
                  <div className="entra flex flex-col items-center gap-2">
                    <span className="text-base sm:text-lg font-extrabold text-foglia text-center px-2">
                      Parti dal grande ({problem.big}) e aggiungi {problem.small}: guarda quanti sono in tutto
                    </span>
                    <Linea20 big={problem.big} small={problem.small} />
                  </div>
                )}
                {aiuto && usaCornice && problem.op === "−" && (
                  <div className="entra flex flex-col items-center gap-1">
                    <span className="text-base sm:text-lg font-extrabold text-terra/60">Ne avevamo {problem.a}, ne togliamo {problem.b}: quanti restano accesi?</span>
                    <Linea20 big={problem.a} removed={problem.b} />
                  </div>
                )}
                {aiuto && usaLinea && problem.key === "countUp" && (
                  <div className="entra flex flex-col items-center">
                    <span className="text-base sm:text-lg font-extrabold text-foglia mb-1">Da {problem.from} salta fino a {problem.to}: somma i salti!</span>
                    <LineaConSalti min={Math.max(0, problem.from - 1)} max={problem.to + 1} archi={saltiInAvanti(problem.from, problem.to)} />
                  </div>
                )}
                {aiuto && usaLinea && problem.key === "bridgeSub" && (
                  <div className="entra flex flex-col items-center">
                    <span className="text-base sm:text-lg font-extrabold text-bacca mb-1">Scendi a 10 (−{problem.units}), poi togli ancora −{problem.resto}</span>
                    <LineaConSalti min={Math.max(0, problem.ans - 1)} max={problem.a + 1} coloreArchi="#E27D8F"
                      archi={[ { from: 10, to: problem.a, label: "−" + problem.units }, { from: problem.ans, to: 10, label: "−" + problem.resto } ]} />
                  </div>
                )}
                {usaPietre && (
                  <div className="entra w-full">
                    <p className="text-center text-base sm:text-lg font-extrabold text-foglia mb-2">
                      La rana salta sempre di {problem.indietro ? "−" : "+"}{problem.step}
                    </p>
                    <PietreSalti seq={problem.seq} step={problem.step} missingIndex={problem.missingIndex} indietro={problem.indietro} />
                  </div>
                )}
                {aiuto && usaGruppi && (
                  <div className="entra flex flex-col gap-2 items-center">
                    {Array(problem.a).fill(0).map((_, r) => (
                      <div key={r} className="flex gap-1.5 bg-white rounded-2xl px-3 py-2 shadow-sm border-2 border-pesca/30">
                        {Array(problem.b).fill(0).map((_, c) => <span key={c} className="text-2xl">{problem.emoji}</span>)}
                      </div>
                    ))}
                    <span className="text-base sm:text-lg font-extrabold text-terra/60">{problem.a} gruppi da {problem.b}</span>
                  </div>
                )}
                {aiuto && usaShare && (
                  <div className="entra flex flex-col items-center gap-2">
                    <div className="flex gap-1 flex-wrap justify-center max-w-[260px] bg-white rounded-2xl p-3 shadow-sm border-2 border-pesca/30">
                      {Array(problem.a).fill(0).map((_, i) => <span key={i} className="text-2xl">{problem.emoji}</span>)}
                    </div>
                    <span className="text-base sm:text-lg font-extrabold text-terra/60">{problem.a} da dividere tra {problem.b} amici</span>
                  </div>
                )}
              </div>

              {/* OPERAZIONE */}
              {!usaPietre && (
                <div className={`font-display text-4xl sm:text-5xl font-extrabold mb-5 flex items-center justify-center gap-2.5 transition-transform
                  ${phase === "win" ? "scale-110 text-foglia" : "text-terra"}`}>
                  {problem.micro ? (
                    microStep === 0
                      ? <span>{problem.a} + <span className="text-bacca">?</span> = 10</span>
                      : <span>10 + {problem.resto} = <span className="text-bacca">?</span></span>
                  ) : usaBonds ? (
                    <Fragment>
                      <span>{problem.a} + </span>
                      {isInput ? <span className={boxClass}>{userInput || "?"}</span> : <span className="text-bacca">?</span>}
                      <span> = {problem.target}</span>
                    </Fragment>
                  ) : (
                    <Fragment>
                      <span>{problem.a} {problem.op} {problem.b} =</span>
                      {isInput ? <span className={boxClass}>{userInput || "?"}</span> : <span className="text-bacca">?</span>}
                    </Fragment>
                  )}
                </div>
              )}

              {/* RISPOSTE A SCELTA */}
              {!isInput && opzioniMostrate && (
                <div className="grid grid-cols-3 gap-3 w-full max-w-md px-2">
                  {opzioniMostrate.map((opt, i) => {
                    const sbagliato = wrong.includes(opt);
                    const corretto = phase === "win" && opt === problem.ans;
                    return (
                      <button key={i} disabled={sbagliato || phase === "win"}
                        onClick={() => valuta(opt)}
                        className={`h-20 rounded-3xl font-display text-3xl font-extrabold shadow-md transition-all border-b-4
                          ${sbagliato ? "bg-gray-100 text-gray-300 border-gray-200 opacity-50"
                            : corretto ? "bg-foglia text-white border-foglia pop"
                            : "bg-white text-terra border-prato/20 active:scale-95 active:border-b-0"}`}>
                        {opt}
                      </button>
                    );
                  })}
                </div>
              )}

              {/* TASTIERINO (sfida finale) */}
              {isInput && (
                <div className="flex flex-col items-center gap-3 w-full">
                  {usaPietre && (
                    <div className="font-display text-3xl font-extrabold text-terra flex items-center gap-2">
                      <span>La risposta è</span>
                      <span className={boxClass}>{userInput || "?"}</span>
                    </div>
                  )}
                  <div className="grid grid-cols-3 gap-2.5 w-full max-w-[300px]">
                    {[1,2,3,4,5,6,7,8,9].map(n => (
                      <button key={n} onClick={() => numpad(String(n))}
                        className="h-14 bg-white rounded-2xl text-2xl font-display font-extrabold text-terra shadow-sm border-b-4 border-prato/15 active:scale-95 active:border-b-0">
                        {n}
                      </button>
                    ))}
                    <button onClick={() => numpad("C")} className="h-14 bg-pesca/30 rounded-2xl text-bacca shadow-sm border-b-4 border-pesca/40 active:scale-95 flex items-center justify-center">
                      <Delete className="w-6 h-6"/>
                    </button>
                    <button onClick={() => numpad("0")} className="h-14 bg-white rounded-2xl text-2xl font-display font-extrabold text-terra shadow-sm border-b-4 border-prato/15 active:scale-95">0</button>
                    <button onClick={() => numpad("OK")}
                      className={`h-14 rounded-2xl shadow-sm border-b-4 flex items-center justify-center active:scale-95
                        ${userInput ? "bg-foglia text-white border-foglia" : "bg-gray-100 text-gray-300 border-gray-200"}`}>
                      <Check className="w-7 h-7"/>
                    </button>
                  </div>
                </div>
              )}

              {toast && <Toast {...toast} />}
            </div>
          );
        }

        /* ---------- HEADER ---------- */
        function Header({ stelle, equipped, onArmadio, stage, correctInStage, onHome, compact, onFullscreen, isFs, bloccato }) {
          return (
            <div className="w-full max-w-md flex items-center justify-between gap-2">
              {!compact && !bloccato && (
                <button onClick={onHome} className="bg-white w-11 h-11 rounded-full flex items-center justify-center shadow-sm border-2 border-prato/15 active:scale-90 flex-shrink-0">
                  <span className="text-lg">🏡</span>
                </button>
              )}
              {onFullscreen && (
                <button onClick={onFullscreen} aria-label="Tutto schermo"
                  className="bg-white w-11 h-11 rounded-full flex items-center justify-center shadow-sm border-2 border-prato/15 active:scale-90 flex-shrink-0 text-terra">
                  {isFs ? <Minimize className="w-5 h-5"/> : <Maximize className="w-5 h-5"/>}
                </button>
              )}
              {stage && (
                <div className="flex-1 bg-white rounded-2xl px-3 py-2 shadow-sm border-2 border-prato/15 min-w-0">
                  <div className="flex items-center gap-1.5">
                    <span className="text-base">{stage.icona}</span>
                    <span className="font-display font-extrabold text-terra text-sm truncate">{stage.nome}</span>
                  </div>
                  <div className="flex gap-1 mt-1">
                    {Array(PER_STAGE).fill(0).map((_, i) => (
                      <div key={i} className={`h-2 flex-1 rounded-full ${i < correctInStage ? "bg-foglia" : "bg-prato/15"}`}/>
                    ))}
                  </div>
                </div>
              )}
              {bloccato ? (
                /* durante l'esercizio: solo conteggio stelle, NON cliccabile (niente fughe verso l'armadio) */
                <div className="flex items-center gap-1.5 bg-white pl-2 pr-3 py-1.5 rounded-full shadow-sm border-2 border-miele/30 flex-shrink-0">
                  <div className="w-8 h-8 rounded-full overflow-hidden border border-prato/20"><Avatar equipped={equipped} size={32}/></div>
                  <Star className="w-4 h-4 text-miele"/>
                  <span className="font-display font-extrabold text-terra">{stelle}</span>
                </div>
              ) : (
                <button onClick={onArmadio} className="flex items-center gap-1.5 bg-white pl-2 pr-3 py-1.5 rounded-full shadow-sm border-2 border-miele/30 active:scale-95 flex-shrink-0">
                  <div className="w-8 h-8 rounded-full overflow-hidden border border-prato/20"><Avatar equipped={equipped} size={32}/></div>
                  <Star className="w-4 h-4 text-miele"/>
                  <span className="font-display font-extrabold text-terra">{stelle}</span>
                </button>
              )}
            </div>
          );
        }

        /* ---------- TOAST stelle ---------- */
        function Toast({ text, bonus }) {
          return (
            <div className="fixed left-1/2 -translate-x-1/2 bottom-8 z-50 pop">
              <div className={`px-6 py-3 rounded-full font-display font-extrabold text-lg shadow-lg flex items-center gap-2
                ${bonus ? "bg-miele text-white" : "bg-white text-terra border-2 border-miele/30"}`}>
                {text}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<MathGame />);
    </script>
</body>
</html>
